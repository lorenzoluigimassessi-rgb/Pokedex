<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⤢ Expand — Variations</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #0a0a14; color: #fff; padding: 40px 20px 64px; display: flex; flex-direction: column; align-items: center; gap: 40px; }
h1 { font-family: 'Fredoka One'; font-size: 22px; }
.sub { font-size: 12px; color: rgba(255,255,255,.35); font-weight: 700; text-align: center; line-height: 1.7; }

.row { display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
.opt { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.opt-label { font-family: 'Fredoka One'; font-size: 12px; color: rgba(255,255,255,.35); text-align: center; }

.phone { width: 180px; height: 240px; background: #f5f2eb; border-radius: 28px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.6); position: relative; }
.hero { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.hero-bg { position: absolute; inset: 0; opacity: .18; }
.hero img { width: 90px; height: 90px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,.2)); position: relative; z-index: 1; }
.hero-name { font-family: 'Fredoka One'; font-size: 16px; color: #2d2d2d; position: relative; z-index: 1; margin-top: 4px; text-transform: capitalize; }

.eb {
  position: absolute; top: 10px; right: 12px; z-index: 10;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,.78); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.18); backdrop-filter: blur(4px);
}
svg { display: block; }
</style>
</head>
<body>

<h1>⤢ Diagonal — Lunghezza &amp; Spessore</h1>
<p class="sub">Due frecce diagonali contrapposte (↗ in alto a destra, ↙ in basso a sinistra).<br/>Stesso concetto di ⤢, disegnato come SVG.</p>

<div class="row">

  <!-- XS short thin -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#f08030"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png"/>
        <div class="hero-name">Charizard</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- top-right arrow ↗ -->
          <path d="M10 4l4 -4 0 4 -4 0"/>
          <!-- bottom-left arrow ↙ -->
          <path d="M8 14l-4 4 0 -4 4 0"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">XS corte sottili</div>
  </div>

  <!-- S medium-thin -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#6890f0"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/131.png"/>
        <div class="hero-name">Lapras</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3l6 -3 0 5 -5 0"/>
          <path d="M9 15l-6 3 0 -5 5 0"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">S corte</div>
  </div>

  <!-- M balanced — closest to ⤢ feel -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#78c850"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/3.png"/>
        <div class="hero-name">Venusaur</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1l9 0 0 9"/>
          <path d="M10 17l-9 0 0 -9"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">M bilanciate</div>
  </div>

  <!-- M with line through centre -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#f85888"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png"/>
        <div class="hero-name">Mewtwo</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1l9 0 0 9"/>
          <path d="M10 17l-9 0 0 -9"/>
          <line x1="3" y1="15" x2="15" y2="3" stroke-width="1.5" stroke-dasharray="2 2"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">M + linea centro</div>
  </div>

  <!-- L long -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#a890f0"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/249.png"/>
        <div class="hero-name">Lugia</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 0l12 0 0 12"/>
          <path d="M12 18l-12 0 0 -12"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">L lunghe</div>
  </div>

  <!-- M thick -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#f8d030"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"/>
        <div class="hero-name">Pikachu</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1l9 0 0 9"/>
          <path d="M10 17l-9 0 0 -9"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">M spesse</div>
  </div>

  <!-- S thick -->
  <div class="opt">
    <div class="phone">
      <div class="hero"><div class="hero-bg" style="background:#705898"></div>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png"/>
        <div class="hero-name">Gengar</div></div>
      <button class="eb">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3l6 -3 0 5 -5 0"/>
          <path d="M9 15l-6 3 0 -5 5 0"/>
        </svg>
      </button>
    </div>
    <div class="opt-label">S spesse</div>
  </div>

</div>
</body>
</html>
